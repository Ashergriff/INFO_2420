<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLACE HOLDER FOR WEBSITE</title>
<style>
  body {
    background-color: #F7F3E8;
    color: #5F6B5C;
    font-family: Georgia, serif;
    margin: 0;
    padding: 20px;
    line-height: 1.6;
	font-size: 100%;
  }

  h1, h2, h3, h4, h5, h6 {
    color: #2F4A3C;
    margin-top: 1.2em;
  }

  p {
    color: #5F6B5C;
    margin-bottom: 1em;
  }

a:link {
  color: #95CA2D;
  text-decoration: none;
}

a:visited {
  color: #6B4F3A;
  text-decoration: none;
}

a:hover {
  color: #C89B3C;
  text-decoration: underline;
}

  button,
  .btn {
    background-color: #6B4F3A;
    color: #F7F3E8;
    border: 1px solid #C89B3C;
    padding: 10px 16px;
    cursor: pointer;
  }
 
.btn:visited {
  color: #F7F3E8;
  text-decoration: none;
}
  button:hover,
  .btn:hover {
    background-color: #5a4230;
  }

  hr,
  .divider {
    border: 0;
    border-top: 2px solid #C89B3C;
    margin: 20px 0;
  }
  blockquote {
  color: #2F4A3C;
  font-style: italic;
  margin-left: 20px;
  }
  
  ol {
    color: #5F6B5C;
  }
  
  li {
    margin-bottom: 0.4em;
  }
  
  /* General image styling */
  .img-left {
    float: left;
    padding-right: 15px;
    padding-bottom: 10px;
  }

  .img-right {
    float: right;
    padding-left: 15px;
    padding-bottom: 10px;
  }
</style>
</head>
